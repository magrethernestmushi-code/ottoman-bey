<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ottoman Bey Restaurant POS</title>
<style>
  :root{--gold:#D4AF37;--gold-l:#F0D060;--black:#0F0F0F;--brown:#2B1B12;--brown2:#3D2518}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--black);color:#FFFDF5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .wrap{max-width:420px;width:100%;text-align:center}
  h1{color:var(--gold);letter-spacing:1px;margin-bottom:8px;font-size:1.4rem}
  p{color:#BBB;margin-bottom:28px;font-size:.9rem}
  a.btn{display:block;padding:18px;margin-bottom:14px;border-radius:12px;text-decoration:none;font-weight:700;letter-spacing:.5px}
  .staff{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:var(--black)}
  .admin{background:var(--brown2);color:var(--gold);border:1px solid rgba(212,175,55,.4)}
</style>
</head>
<body>
  <div class="wrap">
    <h1>🍽️ OTTOMAN BEY RESTAURANT</h1>
    <p>Choose which app to open on this device</p>
    <a class="btn staff" href="/staff">Staff POS — Waiter / Cashier / Kitchen</a>
    <a class="btn admin" href="/admin">Admin Panel</a>
  </div>
</body>
</html>
